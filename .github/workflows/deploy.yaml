# Fix to failed git push due to conflict with untracked files
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/spiritans

            echo "── Clearing local migration conflicts ──"
            # This removes untracked files and forces the migrations folder to match GitHub
            git clean -fd migrations/
            git checkout -- migrations/ || true

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing dependencies ──"
            CI=true /usr/local/bin/pnpm install --no-frozen-lockfile

            echo "── Building ──"
            /usr/local/bin/pnpm build

            echo "── Running migrations ──"
            /usr/local/bin/pnpm payload migrate

            echo "── Restarting app ──"
            /usr/local/bin/pm2 delete spiritans || true
            /usr/local/bin/pm2 start ecosystem.config.cjs --env production

            echo "── Done ──"
            /usr/local/bin/pm2 status
