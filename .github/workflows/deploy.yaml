

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/spiritans

            echo "── Resetting to match remote ──"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "── Installing dependencies ──"
            CI=true /usr/local/bin/pnpm install --no-frozen-lockfile

            echo "── Running migrations ──"
            /usr/local/bin/pnpm payload migrate

            echo "── Building ──"
            /usr/local/bin/pnpm build

            

            echo "── Restarting app ──"
            /usr/local/bin/pm2 delete spiritans || true
            /usr/local/bin/pm2 start ecosystem.config.cjs --env production

            echo "── Done ──"
            /usr/local/bin/pm2 status
